services:
  postgres:
    image: postgres:16-alpine
    container_name: loomis-postgres
    environment:
      POSTGRES_USER: loomis
      POSTGRES_PASSWORD: loomis
      POSTGRES_DB: loomis
    ports:
      - "15432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./scripts/init-audit-db.sql:/docker-entrypoint-initdb.d/01-init-audit-db.sql:ro
      - ./scripts/audit-schema.sql:/docker-entrypoint-initdb.d/audit-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loomis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: loomis-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - ./redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: loomis-mailpit
    ports:
      - "11025:1025"
      - "18025:8025"
